<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教師端 回答區</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4 page-wrap">
    <div class="row justify-content-center">
      <div class="col-lg-11">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
          <div>
            <h1 class="h3 mb-1">教師端 回答區</h1>
            <p class="text-muted mb-0">查看指定問題的回答狀況</p>
          </div>
          <div class="d-flex gap-2">
            <button id="btnToggleNickname" class="btn btn-outline-secondary">顯示暱稱</button>
            <button id="btnBackToQuestions" class="btn btn-outline-secondary">回標題區</button>
          </div>
        </div>

        <div class="card shadow-sm mb-4">
          <div class="card-body p-4">
            <div class="row g-3 mb-3">
              <div class="col-md-6 col-lg-3">
                <div class="info-box">
                  <div class="info-label">討論區編號</div>
                  <div id="discussionCode" class="info-value">----</div>
                </div>
              </div>
              <div class="col-md-6 col-lg-3">
                <div class="info-box">
                  <div class="info-label">目前加入人數</div>
                  <div id="participantCount" class="info-value">0</div>
                </div>
              </div>
            </div>
            <div>
              <div class="fw-semibold mb-2">問題內容</div>
              <div id="questionText" class="question-card">載入中...</div>
            </div>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
              <h2 class="h5 mb-0">回答列表</h2>
              <small id="nicknameStatusText" class="text-muted">目前預設隱藏暱稱</small>
            </div>
            <div class="table-responsive">
              <table class="table table-bordered table-striped align-middle">
                <thead class="table-light">
                  <tr>
                    <th style="width: 18%;">暱稱</th>
                    <th style="width: 18%;">時間</th>
                    <th>內容</th>
                  </tr>
                </thead>
                <tbody id="answersTableBody"></tbody>
              </table>
            </div>
            <div id="answersMessage" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./assets/js/teacher-answers.js"></script>
</body>
</html>
