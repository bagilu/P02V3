<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教師端 問題區</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4 page-wrap">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
          <div>
            <h1 class="h3 mb-1">教師端 問題區</h1>
            <p class="text-muted mb-0">管理問題清單與設定作用中的問題</p>
          </div>
          <div class="d-flex gap-2">
            <button id="btnCloseDiscussion" class="btn btn-danger">結束討論</button>
            <a href="./teacher-entry.html" class="btn btn-outline-secondary">回教師入口</a>
          </div>
        </div>

        <div class="card shadow-sm mb-4">
          <div class="card-body p-4">
            <div class="row g-3">
              <div class="col-md-4">
                <div class="info-box">
                  <div class="info-label">討論區編號</div>
                  <div id="discussionCode" class="info-value">----</div>
                </div>
              </div>
              <div class="col-md-4">
                <div class="info-box">
                  <div class="info-label">目前加入人數</div>
                  <div id="participantCount" class="info-value">0</div>
                </div>
              </div>
              <div class="col-md-4">
                <div class="info-box">
                  <div class="info-label">目前作用中問題</div>
                  <div id="activeQuestionLabel" class="info-value small-value">尚未設定</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="card shadow-sm mb-4">
          <div class="card-body p-4">
            <h2 class="h5 mb-3">新增新問題</h2>
            <div class="mb-3">
              <textarea id="newQuestionText" class="form-control" rows="3" placeholder="請輸入新的問題內容"></textarea>
            </div>
            <button id="btnAddQuestion" class="btn btn-primary">增加新問題</button>
            <div id="questionMessage" class="mt-3"></div>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
              <h2 class="h5 mb-0">問題清單</h2>
              <small class="text-muted">同一時間只會有一個作用中的問題</small>
            </div>
            <div id="questionList" class="list-group"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./assets/js/teacher-questions.js"></script>
</body>
</html>
