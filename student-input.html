<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生端 回答輸入</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4 page-wrap">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
          <div>
            <h1 class="h3 mb-1">學生端 回答畫面</h1>
            <p class="text-muted mb-0">請針對目前作用中的問題輸入您的回答</p>
          </div>
          <div>
            <button id="btnLeaveDiscussionTop" class="btn btn-outline-secondary">離開討論</button>
          </div>
        </div>

        <div class="card shadow-sm mb-4">
          <div class="card-body p-4">
            <div class="row g-3">
              <div class="col-md-6">
                <div class="info-box">
                  <div class="info-label">討論區編號</div>
                  <div id="discussionCode" class="info-value">----</div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="info-box">
                  <div class="info-label">目前加入人數</div>
                  <div id="participantCount" class="info-value">0</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="card shadow-sm mb-4">
          <div class="card-body p-4">
            <div class="mb-2 fw-semibold">目前問題</div>
            <div id="activeQuestionText" class="question-card mb-4">載入中...</div>

            <div class="mb-3">
              <label for="answerContent" class="form-label">您的回答</label>
              <textarea id="answerContent" class="form-control" rows="8" placeholder="請輸入您的回答內容"></textarea>
            </div>

            <button id="btnSubmitAnswer" class="btn btn-primary btn-lg">送出</button>
            <div id="submitMessage" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./assets/js/student-input.js"></script>
</body>
</html>
