<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生端 等待畫面</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-5 page-wrap">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card shadow-sm text-center">
          <div class="card-body p-5">
            <h1 class="h3 mb-3">等待畫面</h1>
            <p class="lead">您的回答已送出。</p>
            <p id="submittedTimeText" class="text-muted mb-4">載入中...</p>

            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
              <button id="btnNextAnswer" class="btn btn-primary btn-lg">下一個回答</button>
              <button id="btnLeaveDiscussion" class="btn btn-outline-secondary btn-lg">離開討論</button>
            </div>

            <div id="waitingMessage" class="mt-4"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./assets/js/student-waiting.js"></script>
</body>
</html>
